name: Build and release Xray

on:
  workflow_dispatch:
    inputs:
      force:
        description: Rebuild the latest stable libXray release
        type: boolean
        default: false
  schedule:
    - cron: "23 4 * * *"
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "scripts/**"
      - "go.mod"
      - ".github/workflows/release-xray.yml"

permissions:
  contents: write

concurrency:
  group: xray-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      NDK_VERSION: 27.2.12479018
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest stable libXray
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          release_json="$(gh api 'repos/XTLS/libXray/releases/latest')"
          upstream_tag="$(jq -r '.tag_name' <<<"$release_json")"
          draft="$(jq -r '.draft' <<<"$release_json")"
          prerelease="$(jq -r '.prerelease' <<<"$release_json")"
          if [[ "$draft" != false || "$prerelease" != false ]]; then
            echo "GitHub latest release is not stable" >&2
            exit 1
          fi
          if [[ ! "$upstream_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Unsupported libXray tag: $upstream_tag" >&2
            exit 1
          fi
          year="${BASH_REMATCH[1]}"
          month="${BASH_REMATCH[2]}"
          day="${BASH_REMATCH[3]}"
          printf -v month_padded '%02d' "$((10#$month))"
          printf -v day_padded '%02d' "$((10#$day))"
          module_version="v1.${year}${month_padded}${day_padded}.0"
          upstream_commit="$(gh api "repos/XTLS/libXray/commits/$upstream_tag" --jq '.sha')"
          upstream_go_mod="$(gh api "repos/XTLS/libXray/contents/go.mod?ref=$upstream_tag" --jq '.content' | base64 --decode)"
          go_version="$(awk '$1 == "go" { print $2; exit }' <<<"$upstream_go_mod")"
          release_tag="xray-$upstream_tag"
          needed=true
          if gh release view "$release_tag" >/dev/null 2>&1 \
              && [[ "${{ inputs.force || false }}" != true ]]; then
            needed=false
          fi
          {
            echo "tag=$upstream_tag"
            echo "commit=$upstream_commit"
            echo "module_version=$module_version"
            echo "go_version=$go_version"
            echo "release_tag=$release_tag"
            echo "needed=$needed"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.upstream.outputs.needed == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.upstream.outputs.go_version }}
          cache: true

      - name: Set up Android SDK
        if: steps.upstream.outputs.needed == 'true'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: steps.upstream.outputs.needed == 'true'
        run: sdkmanager "ndk;$NDK_VERSION"

      - name: Pin libXray and test adapter
        if: steps.upstream.outputs.needed == 'true'
        run: |
          set -euo pipefail
          go get "github.com/xtls/libxray@${{ steps.upstream.outputs.module_version }}"
          go mod tidy
          go test ./...

      - name: Build four Android ABIs twice
        if: steps.upstream.outputs.needed == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: |
          set -euo pipefail
          ./scripts/build_android.sh dist
          ./scripts/build_android.sh dist-repro
          ./scripts/verify_artifacts.py dist
          ./scripts/verify_artifacts.py dist-repro
          for artifact in dist/libxray-*.so; do
            cmp "$artifact" "dist-repro/${artifact#dist/}"
          done

      - name: Record exact upstream pin
        if: steps.upstream.outputs.needed == 'true'
        id: wrapper
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add go.mod go.sum
          if ! git diff --cached --quiet; then
            git commit -m "Pin libXray ${{ steps.upstream.outputs.tag }}"
            git push origin HEAD:main
          fi
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        if: steps.upstream.outputs.needed == 'true'
        run: |
          ./scripts/generate_manifest.py \
            --directory dist \
            --upstream-tag "${{ steps.upstream.outputs.tag }}" \
            --upstream-commit "${{ steps.upstream.outputs.commit }}" \
            --wrapper-commit "${{ steps.wrapper.outputs.commit }}" \
            --output dist/manifest.json

      - name: Publish release
        if: steps.upstream.outputs.needed == 'true'
        run: |
          gh release create "${{ steps.upstream.outputs.release_tag }}" \
            dist/libxray-arm64-v8a.so \
            dist/libxray-armeabi-v7a.so \
            dist/libxray-x86.so \
            dist/libxray-x86_64.so \
            dist/manifest.json \
            --title "Xray ${{ steps.upstream.outputs.tag }}" \
            --notes "Built from XTLS/libXray ${{ steps.upstream.outputs.tag }} (${{ steps.upstream.outputs.commit }}) for Android API 26+."

