name: Build and release exitFy SB core

on:
  workflow_dispatch:
    inputs:
      force:
        description: Build a new wrapper revision even when the current one is complete
        type: boolean
        default: false
  schedule:
    - cron: "41 4 * * *"
  push:
    branches: [main]
    paths:
      - "singbox/**"
      - "scripts/**"
      - ".github/workflows/release-singbox.yml"
      - "README.md"
      - "THIRD_PARTY.md"

permissions:
  contents: read

concurrency:
  group: singbox-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      build_needed: ${{ steps.resolve.outputs.build_needed }}
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
      upstream_version: ${{ steps.resolve.outputs.upstream_version }}
      upstream_commit: ${{ steps.resolve.outputs.upstream_commit }}
      go_version: ${{ steps.resolve.outputs.go_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    env:
      GH_TOKEN: ${{ github.token }}
      NDK_VERSION: 27.2.12479018
      SB_BUILD_TAGS: with_quic,with_utls,badlinkname,tfogo_checklinkname0
      GOTOOLCHAIN: local
      FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Audit public repository contents
        run: ./scripts/audit_public_tree.py

      - name: Resolve stable upstream and wrapper revision
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/fetch_github_release_pages.sh SagerNet/sing-box \
            "$RUNNER_TEMP/upstream-releases.json"
          upstream="$(jq -c '
            [ .[] | select(.draft == false and .prerelease == false)
              | select(.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))
              | (.tag_name | capture("^v(?<a>[0-9]+)\\.(?<b>[0-9]+)\\.(?<c>[0-9]+)$")
                 | [(.a|tonumber),(.b|tonumber),(.c|tonumber)]) as $parts
              | . + {parts:$parts} ] | sort_by(.parts) | last
          ' "$RUNNER_TEMP/upstream-releases.json")"
          if [[ -z "$upstream" || "$upstream" == null ]]; then
            echo "No stable sing-box release found" >&2
            exit 1
          fi
          upstream_tag="$(jq -r '.tag_name' <<<"$upstream")"
          upstream_version="${upstream_tag#v}"
          upstream_commit="$(gh api "repos/SagerNet/sing-box/commits/$upstream_tag" --jq .sha)"
          go_mod="$(gh api "repos/SagerNet/sing-box/contents/go.mod?ref=$upstream_tag" \
            --jq .content | base64 --decode)"
          go_version="$(awk '$1 == "go" { print $2; exit }' <<<"$go_mod")"
          if [[ ! "$go_version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Unsupported Go version: $go_version" >&2
            exit 1
          fi

          ./scripts/fetch_github_release_pages.sh "$GITHUB_REPOSITORY" \
            "$RUNNER_TEMP/core-releases.json"
          prefix="sb-$upstream_tag-w"
          max_revision="$(jq -r --arg prefix "$prefix" '
            [ .[] | select(.draft == false) | .tag_name
              | select(startswith($prefix))
              | try (capture("-w(?<n>[0-9]+)$").n | tonumber) catch empty ]
            | max // 1
          ' "$RUNNER_TEMP/core-releases.json")"
          source_name="exitfy-sb-$upstream_tag-source.tar.gz"
          expected_assets="$source_name,libexitfy-sb-arm64-v8a.so,libexitfy-sb-armeabi-v7a.so,libexitfy-sb-x86.so,libexitfy-sb-x86_64.so,manifest.json"
          current=false
          while IFS=$'\t' read -r tag assets manifest_id; do
            [[ "$assets" == "$expected_assets" && -n "$manifest_id" ]] || continue
            gh api -H 'Accept: application/octet-stream' \
              "repos/$GITHUB_REPOSITORY/releases/assets/$manifest_id" \
              > "$RUNNER_TEMP/current-manifest.json"
            if jq -e --arg upstream "$upstream_commit" --arg wrapper "$GITHUB_SHA" '
              .schema == 2 and .coreApi == 2 and .configContract == 1
              and .family == "sing_box" and .upstream.commit == $upstream
              and .wrapper.commit == $wrapper
            ' "$RUNNER_TEMP/current-manifest.json" >/dev/null; then
              current=true
              break
            fi
          done < <(jq -r --arg prefix "$prefix" '
            .[] | select(.draft == false and .prerelease == false)
            | select(.tag_name | startswith($prefix))
            | [ .tag_name, ([.assets[].name] | sort | join(",")),
                ([.assets[] | select(.name == "manifest.json") | .id][0] // "") ]
            | @tsv
          ' "$RUNNER_TEMP/core-releases.json")

          build_needed=true
          if [[ "$current" == true && "$FORCE_REBUILD" != true ]]; then
            build_needed=false
          fi
          revision=$((max_revision + 1))
          release_tag="sb-$upstream_tag-w$revision"
          {
            echo "build_needed=$build_needed"
            echo "upstream_tag=$upstream_tag"
            echo "upstream_version=$upstream_version"
            echo "upstream_commit=$upstream_commit"
            echo "go_version=$go_version"
            echo "release_tag=$release_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.resolve.outputs.build_needed == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ steps.resolve.outputs.go_version }}
          cache-dependency-path: singbox/go.sum

      - name: Set up Android SDK
        if: steps.resolve.outputs.build_needed == 'true'
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install Android NDK
        if: steps.resolve.outputs.build_needed == 'true'
        run: sdkmanager "ndk;$NDK_VERSION"

      - name: Pin exact upstream and test adapter
        if: steps.resolve.outputs.build_needed == 'true'
        run: |
          set -euo pipefail
          cd singbox
          go get "github.com/sagernet/sing-box@${{ steps.resolve.outputs.upstream_commit }}"
          go mod edit -go="${{ steps.resolve.outputs.go_version }}"
          go mod tidy
          resolved="$(go list -m -f '{{.Version}}' github.com/sagernet/sing-box)"
          [[ "$resolved" == "${{ steps.resolve.outputs.upstream_tag }}" ]]
          go test -tags "$SB_BUILD_TAGS" ./...

      - name: Preflight all Android ABIs
        if: steps.resolve.outputs.build_needed == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: |
          ./scripts/build_singbox_android.sh dist
          ./scripts/verify_singbox_artifacts.py dist

      - name: Build and audit corresponding source twice
        if: steps.resolve.outputs.build_needed == 'true'
        run: |
          set -euo pipefail
          source="dist/exitfy-sb-${{ steps.resolve.outputs.upstream_tag }}-source.tar.gz"
          source_repro="dist-repro/exitfy-sb-${{ steps.resolve.outputs.upstream_tag }}-source.tar.gz"
          ./scripts/build_singbox_source_bundle.py \
            --upstream-version "${{ steps.resolve.outputs.upstream_tag }}" --output "$source"
          ./scripts/build_singbox_source_bundle.py \
            --upstream-version "${{ steps.resolve.outputs.upstream_tag }}" --output "$source_repro"
          cmp "$source" "$source_repro"
          ./scripts/audit_singbox_source_bundle.py "$source"

      - name: Rebuild four ABIs twice from attached source
        if: steps.resolve.outputs.build_needed == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: |
          set -euo pipefail
          version="${{ steps.resolve.outputs.upstream_version }}"
          source="dist/exitfy-sb-v${version}-source.tar.gz"
          mkdir -p dist/source-a dist-repro/source-b dist/rebuilt dist-repro/rebuilt
          tar -xzf "$source" -C dist/source-a
          tar -xzf "$source" -C dist-repro/source-b
          root_a="dist/source-a/exitfy-sb-source-${version}"
          root_b="dist-repro/source-b/exitfy-sb-source-${version}"
          "$root_a/scripts/build_singbox_android.sh" dist/rebuilt
          "$root_b/scripts/build_singbox_android.sh" dist-repro/rebuilt
          ./scripts/verify_singbox_artifacts.py dist/rebuilt
          ./scripts/verify_singbox_artifacts.py dist-repro/rebuilt
          for artifact in dist/rebuilt/libexitfy-sb-*.so; do
            cmp "$artifact" "dist-repro/rebuilt/${artifact#dist/rebuilt/}"
          done
          cp dist/rebuilt/libexitfy-sb-*.so dist/

      - name: Enable KVM
        if: steps.resolve.outputs.build_needed == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Smoke-test protocol matrix on Android API 26
        if: steps.resolve.outputs.build_needed == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: ./scripts/with_api26_emulator.sh ./scripts/run_singbox_android_smoke.sh dist/libexitfy-sb-x86_64.so

      - name: Preserve exact module pins
        if: steps.resolve.outputs.build_needed == 'true'
        run: |
          mkdir -p dist/pins
          cp singbox/go.mod singbox/go.sum dist/pins/

      - name: Re-audit before handoff to publisher
        if: steps.resolve.outputs.build_needed == 'true'
        run: ./scripts/audit_public_tree.py

      - name: Upload verified candidate
        if: steps.resolve.outputs.build_needed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: singbox-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            dist/libexitfy-sb-arm64-v8a.so
            dist/libexitfy-sb-armeabi-v7a.so
            dist/libexitfy-sb-x86.so
            dist/libexitfy-sb-x86_64.so
            dist/exitfy-sb-${{ steps.resolve.outputs.upstream_tag }}-source.tar.gz
            dist/pins/go.mod
            dist/pins/go.sum
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    if: needs.build.outputs.build_needed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    concurrency:
      group: exitfy-cores-publish
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
      UPSTREAM_TAG: ${{ needs.build.outputs.upstream_tag }}
      UPSTREAM_VERSION: ${{ needs.build.outputs.upstream_version }}
      UPSTREAM_COMMIT: ${{ needs.build.outputs.upstream_commit }}
      GO_VERSION: ${{ needs.build.outputs.go_version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: main

      - name: Download verified candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: singbox-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/candidate

      - name: Commit exact pin after stale-build guard
        id: wrapper
        shell: bash
        run: |
          set -euo pipefail
          head="$(git rev-parse HEAD)"
          if [[ "$head" != "$GITHUB_SHA" ]]; then
            git merge-base --is-ancestor "$GITHUB_SHA" "$head" || {
              echo "main no longer descends from the read-only build" >&2
              exit 1
            }
            while IFS= read -r changed; do
              case "$changed" in
                go.mod|go.sum) ;;
                *)
                  echo "main changed outside the Xray pin: $changed" >&2
                  exit 1
                  ;;
              esac
            done < <(git diff --name-only "$GITHUB_SHA" "$head")
          fi
          cp "$RUNNER_TEMP/candidate/pins/go.mod" singbox/go.mod
          cp "$RUNNER_TEMP/candidate/pins/go.sum" singbox/go.sum
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add singbox/go.mod singbox/go.sum
          if ! git diff --cached --quiet; then
            git commit -m "Pin SB upstream $UPSTREAM_TAG"
            ./scripts/audit_public_tree.py
            git push origin HEAD:main
          fi
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate and verify final manifest
        run: |
          set -euo pipefail
          candidate="$RUNNER_TEMP/candidate"
          source="$candidate/exitfy-sb-$UPSTREAM_TAG-source.tar.gz"
          ./scripts/generate_singbox_manifest.py \
            --directory "$candidate" \
            --upstream-tag "$UPSTREAM_TAG" \
            --upstream-commit "$UPSTREAM_COMMIT" \
            --go-version "$GO_VERSION" \
            --wrapper-commit "${{ steps.wrapper.outputs.commit }}" \
            --release-tag "$RELEASE_TAG" \
            --source-bundle "$source" \
            --output "$candidate/manifest.json"
          ./scripts/verify_singbox_manifest.py \
            "$candidate/manifest.json" "$candidate" "$source"
          ./scripts/audit_public_tree.py

      - name: Create verified draft and publish atomically
        shell: bash
        run: |
          set -euo pipefail
          candidate="$RUNNER_TEMP/candidate"
          source_name="exitfy-sb-$UPSTREAM_TAG-source.tar.gz"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > "$RUNNER_TEMP/releases-before.json"
          draft_count="$(jq -r --arg tag "$RELEASE_TAG" \
            '[.[] | select(.tag_name == $tag and .draft == true)] | length' \
            "$RUNNER_TEMP/releases-before.json")"
          published_count="$(jq -r --arg tag "$RELEASE_TAG" \
            '[.[] | select(.tag_name == $tag and .draft == false)] | length' \
            "$RUNNER_TEMP/releases-before.json")"
          [[ "$published_count" == 0 && "$draft_count" -le 1 ]]
          if [[ "$draft_count" == 0 ]]; then
            gh release create "$RELEASE_TAG" --draft \
              --title "exitFy SB core $UPSTREAM_VERSION · core ABI 2" \
              --notes "Independent exitFy build based on SagerNet $UPSTREAM_TAG ($UPSTREAM_COMMIT). Not affiliated with or endorsed by SagerNet. Android API 26+, core API 2, config contract 1, GPL-3.0-or-later; corresponding source is attached."
          fi
          gh release upload "$RELEASE_TAG" \
            "$candidate/libexitfy-sb-arm64-v8a.so" \
            "$candidate/libexitfy-sb-armeabi-v7a.so" \
            "$candidate/libexitfy-sb-x86.so" \
            "$candidate/libexitfy-sb-x86_64.so" \
            "$candidate/manifest.json" \
            "$candidate/$source_name" --clobber
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            | jq --arg tag "$RELEASE_TAG" \
              '[.[] | select(.tag_name == $tag and .draft == true)]
               | if length == 1 then .[0] else error("verified draft is not unique") end' \
              > "$RUNNER_TEMP/draft.json"
          draft_id="$(jq -r '.id' "$RUNNER_TEMP/draft.json")"
          expected="$source_name,libexitfy-sb-arm64-v8a.so,libexitfy-sb-armeabi-v7a.so,libexitfy-sb-x86.so,libexitfy-sb-x86_64.so,manifest.json"
          actual="$(jq -r '[.assets[].name] | sort | join(",")' "$RUNNER_TEMP/draft.json")"
          [[ "$actual" == "$expected" ]]
          while IFS=$'\t' read -r name digest; do
            local_digest="sha256:$(sha256sum "$candidate/$name" | awk '{print $1}')"
            [[ "$digest" == "$local_digest" ]]
          done < <(jq -r '.assets[] | [.name, .digest] | @tsv' "$RUNNER_TEMP/draft.json")
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$draft_id" \
            -F draft=false -f make_latest=false \
            | jq -e --arg tag "$RELEASE_TAG" \
              '.tag_name == $tag and .draft == false' >/dev/null
